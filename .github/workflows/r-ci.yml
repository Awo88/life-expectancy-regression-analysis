name: R CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
      - name: Install dependencies
        run: |
          install.packages(c('remotes', 'testthat'), repos='https://cloud.r-project.org')
          if (file.exists('DESCRIPTION')) remotes::install_deps(dependencies = TRUE)
        shell: Rscript {0}
      - name: Run tests
        run: |
          if (file.exists("tests")) {
            library(testthat)
            test_dir("tests")
          } else {
            message("No tests found — skipping.")
          }
        shell: Rscript {0}
