name: R CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
      - name: Run R tests
        run: |
          if (file.exists("tests")) {
            library(testthat)
            test_dir("tests")
          } else {
            message("No tests/ directory found — skipping tests.")
          }
        shell: Rscript {0}
