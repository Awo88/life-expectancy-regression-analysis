name: Run & publish results

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Install R packages
        run: Rscript -e "install.packages(c('ggplot2','dplyr','GGally','car','lmtest'), repos='https://cloud.r-project.org')"

      - name: Run analysis
        run: Rscript "life expectancy regression (GH).r"

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f *.png 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update analysis outputs [skip ci]"
          git push
